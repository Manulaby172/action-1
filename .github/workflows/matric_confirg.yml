name: matrix Configraution


on:
    push: 
    workflow_dispatch:

jobs:
    deploy:
      strategy:
        fail-fast: true
        max-parallel: 2
        matrix:
          os: [ubuntu-latest, windows-latest, ubuntu-20.04]
          images: [hello-world, alpine]

          #TOTAL OF 6 Jobs are rynning in parallel.
          #I don't want the image alpine to ruin on windows latest, since the combination doesn't supports
          exclude:
            - images: alpine
              os: windows-latest
            
            #now only 5 job will be executed parallely 

          include:
            - images: amd64/alpine
              os: ubuntu-20.04

            #this images is only going to run on Ubuntu machine 

      runs-on: ${{ matrix.os }} 
      steps:

            - name: echo docker info
              run: docker info

            - name: run IMAGES
              run: docker run ${{ matrix.images }}








            

